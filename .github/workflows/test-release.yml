name: Test AiEngine .so (GoogleTest)

on:
  workflow_dispatch: # Запуск по кнопке

env:
  NDK_VERSION: r26b

jobs:
  test:
    runs-on: ubuntu-latest # Возвращаемся на Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build unzip wget

      - name: Setup Android NDK
        run: |
          # Качаем NDK под Linux
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Download Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build-release.yml # Имя вашего YAML файла сборки
          workflow_conclusion: success
          name: libAiEngine-arm64-v8a
          path: downloaded_artifact

      - name: Prepare Test Build
        run: |
          cd downloaded_artifact
          unzip libAiEngine-arm64-v8a.zip
          mkdir -p ../tests
          cp libAiEngine.so ../tests/

      - name: Build GoogleTest Executable
        run: |
          mkdir -p tests/build && cd tests/build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -GNinja
          ninja run_tests

      - name: Run Tests in Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: arm64-v8a
          profile: Nexus 6
          # Максимально отключаем лишнюю графику, чтобы QEMU не тормозил
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "Pushing test executable and library to device..."
            adb push tests/build/run_tests /data/local/tmp/
            adb push tests/libAiEngine.so /data/local/tmp/
            
            echo "Setting permissions..."
            adb shell "chmod +x /data/local/tmp/run_tests"
            
            echo "Running GoogleTest..."
            adb shell "cd /data/local/tmp && LD_LIBRARY_PATH=. ./run_tests"
