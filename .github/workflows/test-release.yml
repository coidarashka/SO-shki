name: Test AiEngine .so (GoogleTest)

on:
  workflow_run:
    workflows: ["Build AiEngine → Release"] # Название из вашего первого workflow
    types:
      - completed

env:
  NDK_VERSION: r26b

jobs:
  test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-13 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        run: brew install cmake ninja

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-darwin.zip
          unzip -q android-ndk-${NDK_VERSION}-darwin.zip
          echo "NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Download Artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build-release.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: libAiEngine-arm64-v8a
          path: downloaded_artifact

      - name: Prepare Test Build
        run: |
          cd downloaded_artifact
          unzip libAiEngine-arm64-v8a.zip
          cp libAiEngine.so ../tests/

      - name: Build GoogleTest Executable
        run: |
          mkdir -p tests/build && cd tests/build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -GNinja
          ninja run_tests

      - name: Run Tests in Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: arm64-v8a
          script: |
            echo "Pushing test executable and library to device..."
            adb push tests/build/run_tests /data/local/tmp/
            adb push tests/libAiEngine.so /data/local/tmp/
            
            echo "Setting permissions..."
            adb shell "chmod +x /data/local/tmp/run_tests"
            
            echo "Running GoogleTest..."
            adb shell "cd /data/local/tmp && LD_LIBRARY_PATH=. ./run_tests"
